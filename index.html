<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Be Happy — Swami Anubhavananda</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,400&family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600&family=Noto+Sans+Devanagari:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --primary: #C76B1E; --primary-soft: #E8914A; --primary-light: #FFF5EB;
  --bg: #FCF9F5; --surface: #FFFFFF;
  --text: #1A1A2E; --text-soft: #4A4A5E; --text-muted: #8A8A9E;
  --border: #E8E0D8; --border-light: #F2ECE4;
  --nav-bg: #FAF5F0; --nav-hover: #FFF0E0;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.04); --shadow-md: 0 4px 16px rgba(0,0,0,0.06);
  --radius: 12px; --radius-sm: 8px;
}
body {
  background: var(--bg); color: var(--text);
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  font-size: 16px; line-height: 1.7; -webkit-font-smoothing: antialiased;
}
.hero {
  background: linear-gradient(135deg, #FAF0E6 0%, #FCF9F5 50%, #FFF8F0 100%);
  border-bottom: 1px solid var(--border);
  padding: 36px 24px 28px; text-align: center;
}
.hero-photo {
  width: 120px; height: 120px; border-radius: 50%; object-fit: cover;
  border: 3px solid var(--primary);
  box-shadow: 0 4px 20px rgba(199,107,30,0.15); margin-bottom: 12px;
}
.hero h1 {
  font-family: 'Playfair Display', serif;
  font-size: 42px; font-weight: 600; color: var(--primary);
  letter-spacing: -0.02em; margin-bottom: 6px;
}
.hero .subtitle { font-size: 17px; color: var(--text-soft); }
.hero .meta { font-size: 13px; color: var(--text-muted); margin-top: 10px; }
.layout { display: flex; min-height: calc(100vh - 156px); }
.sidebar {
  width: 290px; flex-shrink: 0;
  background: var(--nav-bg); border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  position: sticky; top: 0; height: calc(100vh - 156px); overflow: hidden;
}
.sidebar-divider {
  width: 5px; flex-shrink: 0; cursor: ew-resize;
  background: var(--border); position: relative;
}
.sidebar-divider:hover { background: var(--primary-light); }
.sidebar-divider::after {
  content: ''; position: absolute; left: 50%; top: 50%;
  transform: translate(-50%, -50%);
  height: 30px; width: 3px; border-radius: 2px;
  background: var(--text-muted); opacity: 0.3;
}
.search-box { padding: 10px 12px; border-bottom: 1px solid var(--border); }
.search-box input {
  width: 100%; padding: 8px 12px;
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  font-family: inherit; font-size: 13px; background: var(--surface);
  color: var(--text); outline: none;
}
.search-box input:focus { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(199,107,30,0.1); }
.search-box input::placeholder { color: var(--text-muted); }
.sidebar-inner { flex: 1; overflow-y: auto; padding: 8px; }
.nav-section { margin-bottom: 1px; }
.nav-section-toggle {
  width: 100%; text-align: left; background: none; border: none;
  padding: 8px 10px; font-family: 'Inter', sans-serif; font-size: 13px;
  font-weight: 700; color: var(--text); cursor: pointer;
  border-radius: var(--radius-sm); display: flex; align-items: center; gap: 5px;
  user-select: none; letter-spacing: 0.3px;
}
.nav-section-toggle:hover { background: var(--nav-hover); }
.nav-section + .nav-section > .nav-section-toggle {
  border-top: 1px solid var(--border-light);
  padding-top: 10px; margin-top: 4px;
}
.nav-caret {
  font-size: 9px; color: var(--primary); flex-shrink: 0;
  transition: transform 0.2s; display: inline-block; width: 12px; text-align: center;
}
.nav-caret.open { transform: rotate(90deg); }
.nav-count {
  margin-left: auto; font-size: 10px; color: var(--text-muted);
  background: var(--border-light); padding: 1px 6px; border-radius: 10px; flex-shrink: 0;
}
.nav-children { display: none; }
.nav-children.open { display: block; }
.nav-children > .nav-section { position: relative; }
.nav-children > .nav-section::before {
  content: ''; position: absolute; left: 15px; top: 0; bottom: 0;
  width: 2px; background: var(--border-light); border-radius: 1px;
}
.nav-group-toggle {
  width: 100%; text-align: left; background: none; border: none;
  padding: 4px 10px 4px 20px; font-family: 'Inter', sans-serif; font-size: 12px;
  font-weight: 600; color: var(--text-soft); cursor: pointer;
  border-radius: var(--radius-sm); display: flex; align-items: center; gap: 4px;
  user-select: none; position: relative; z-index: 1;
}
.nav-group-toggle:hover { background: var(--nav-hover); }
.nav-pl-toggle {
  width: 100%; text-align: left; background: none; border: none;
  padding: 3px 10px 3px 30px; font-family: 'Inter', sans-serif; font-size: 11px;
  font-weight: 500; color: var(--text-soft); cursor: pointer;
  border-radius: var(--radius-sm); display: flex; align-items: center; gap: 4px;
  user-select: none; position: relative; z-index: 1;
}
.nav-pl-toggle:hover { background: var(--nav-hover); }
.nav-talk {
  display: block; padding: 2px 10px 2px 42px;
  font-size: 11px; color: var(--text-muted); text-decoration: none;
  border-radius: 4px; cursor: pointer; position: relative; z-index: 1;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.nav-talk::before {
  content: '\00B7'; position: absolute; left: 34px;
  color: var(--text-muted); opacity: 0.4; font-weight: 700;
}
.nav-talk:hover { background: var(--primary-light); color: var(--primary); }
.nav-talk:hover::before { color: var(--primary); opacity: 1; }
.nav-talk.active {
  background: var(--primary-light); color: var(--primary); font-weight: 600;
}
.nav-talk.active::before { color: var(--primary); opacity: 1; content: '\203A'; font-size: 14px; left: 32px; }
.nav-section-toggle .nav-count { background: var(--primary-muted); color: var(--primary); }
.content { flex: 1; min-width: 0; padding: 32px 40px 80px; max-width: 900px; }
.welcome { text-align: center; padding: 80px 24px; color: var(--text-muted); }
.welcome p { font-size: 18px; }
.talk-view { display: none; flex-direction: column; height: calc(100vh - 220px); }
.talk-view.active { display: flex; }
.video-pane {
  display: none; flex-shrink: 0; position: relative;
  background: #000; border-radius: var(--radius) var(--radius) 0 0;
  overflow: hidden;
}
.video-pane.active { display: block; }
.video-pane iframe { width: 100%; height: 100%; border: none; }
.video-close {
  position: absolute; top: 8px; right: 8px; z-index: 10;
  background: rgba(0,0,0,0.6); color: #fff; border: none;
  width: 28px; height: 28px; border-radius: 50%; cursor: pointer;
  font-size: 16px; line-height: 1; display: flex; align-items: center; justify-content: center;
}
.video-close:hover { background: rgba(0,0,0,0.8); }
.divider {
  display: none; flex-shrink: 0; height: 6px;
  background: var(--border); cursor: ns-resize; position: relative;
}
.divider::after {
  content: ''; position: absolute; left: 50%; top: 50%;
  transform: translate(-50%, -50%);
  width: 30px; height: 3px; border-radius: 2px; background: var(--text-muted); opacity: 0.4;
}
.divider.active { display: block; }
.divider:hover { background: var(--primary-light); }
.transcript-pane {
  flex: 1; min-height: 100px; overflow-y: auto;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 0 0 var(--radius) var(--radius);
  padding: 24px 28px; line-height: 1.8;
}
.transcript-pane h1 {
  font-family: 'Playfair Display', serif;
  font-size: 26px; font-weight: 600; color: var(--text);
  margin-bottom: 16px; padding-bottom: 10px;
  border-bottom: 2px solid var(--primary);
}
.transcript-pane h3 {
  font-family: 'Playfair Display', serif;
  font-size: 18px; font-weight: 500; color: var(--primary);
  margin-top: 20px; margin-bottom: 8px;
}
.transcript-pane p { margin-bottom: 12px; }
.transcript-pane blockquote {
  margin: 12px 0; padding: 12px 16px;
  border-left: 3px solid var(--primary);
  background: var(--primary-light); border-radius: 4px;
  font-size: 15px;
}
.transcript-pane blockquote p { margin-bottom: 4px; }
.transcript-pane blockquote strong {
  font-size: 20px; font-family: 'Noto Sans Devanagari', serif;
}
.transcript-pane em { color: var(--text-soft); }
.transcript-pane hr { border: none; text-align: center; margin: 20px 0; color: var(--text-muted); font-size: 14px; letter-spacing: 6px; }
.transcript-pane hr::after { content: '\00B7\00B7\00B7'; }
.watch-btn {
  display: inline-flex; align-items: center; gap: 4px;
  margin-bottom: 16px; padding: 8px 16px;
  background: var(--primary); color: #fff; border: none;
  border-radius: var(--radius-sm); cursor: pointer;
  font-family: inherit; font-size: 13px; font-weight: 500;
}
.watch-btn:hover { background: #B05E18; }
.watch-btn.watching { background: var(--text-muted); }
.loading-overlay {
  position: fixed; inset: 0; z-index: 9999;
  background: var(--bg); display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  transition: opacity 0.4s;
}
.loading-overlay.hidden { opacity: 0; pointer-events: none; }
.spinner {
  width: 36px; height: 36px; border: 3px solid var(--border);
  border-top-color: var(--primary); border-radius: 50%;
  animation: spin 0.8s linear infinite; margin-bottom: 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-overlay p { color: var(--text-muted); font-size: 14px; }
.search-empty { padding: 20px 12px; text-align: center; color: var(--text-muted); font-size: 13px; }
.pw-overlay {
  position: fixed; inset: 0; z-index: 10000;
  background: var(--bg); display: flex; align-items: center; justify-content: center;
}
.pw-box { text-align: center; padding: 48px 24px; max-width: 400px; width: 100%; }
.pw-box h1 { font-size: 32px; font-weight: 600; color: var(--primary); margin-bottom: 4px; font-family: 'Playfair Display', serif; }
.pw-box .sub { font-size: 14px; color: var(--text-soft); margin-bottom: 28px; }
.pw-box label { display: block; font-size: 13px; font-weight: 600; color: var(--text-soft); margin-bottom: 8px; text-align: left; }
.pw-box input { width: 100%; padding: 12px 14px; border: 1px solid var(--border); border-radius: 8px; font-family: inherit; font-size: 16px; background: var(--surface); color: var(--text); outline: none; }
.pw-box input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(199,107,30,0.1); }
.pw-box button { width: 100%; padding: 12px; margin-top: 12px; border: none; border-radius: 8px; background: var(--primary); color: #fff; font-family: inherit; font-size: 15px; font-weight: 600; cursor: pointer; }
.pw-box button:hover { background: #B05E18; }
.pw-box button:disabled { opacity: 0.6; cursor: not-allowed; }
.pw-box .error { color: #D32F2F; font-size: 13px; margin-top: 12px; display: none; }
.pw-box .error.show { display: block; }
@media (max-width: 768px) {
  .layout { flex-direction: column; }
  .sidebar { width: 100%; position: static; height: auto; max-height: 50vh; }
  .content { padding: 20px; }
  .hero h1 { font-size: 32px; }
  .talk-view { height: auto; }
}

/* Mobile responsive */
@media (max-width: 768px) {
  .layout { flex-direction: column; }
  .sidebar { width: 100% !important; position: fixed; top: 0; left: 0; height: 100vh; z-index: 100; transform: translateX(-100%); transition: transform 0.3s; }
  .sidebar.open { transform: translateX(0); }
  .sidebar-divider { display: none; }
  .content { padding: 16px; max-width: 100%; }
  .hero h1 { font-size: 28px; }
  .hero { padding: 20px 16px 16px; }
  .hero-photo { width: 80px; height: 80px; }
  .talk-view { height: auto; }
  .transcript-pane { padding: 16px; }
  .sidebar-inner { padding: 4px; }
  .search-box input { font-size: 16px; }
  .pw-box { padding: 32px 16px; }
  .menu-toggle { display: flex !important; }
}
.menu-toggle {
  display: none; position: fixed; top: 12px; left: 12px; z-index: 101;
  width: 36px; height: 36px; border-radius: 8px;
  background: var(--primary); color: #fff; border: none;
  font-size: 20px; cursor: pointer; align-items: center; justify-content: center;
}
.menu-toggle:hover { background: #B05E18; }
.sidebar-overlay {
  display: none; position: fixed; inset: 0; z-index: 99;
  background: rgba(0,0,0,0.3);
}
.sidebar-overlay.open { display: block; }

</style>
</head>

      <button type="submit" id="pwBtn">Access Catalog</button>
      <div class="error" id="pwErr">Incorrect password. Please try again.</div>

</div>

<script>
const PW_HASH = '9129cc5cd1248fa2675dd9c835446d8c728bdffa004a547b091e5a4e599e2cc9';

async function sha(s) {
  const b = new TextEncoder().encode(s);
  const h = await crypto.subtle.digest('SHA-256', b);
  return Array.from(new Uint8Array(h)).map(x => x.toString(16).padStart(2,'0')).join('');
}

if (sessionStorage.getItem('behappy_auth') === 'true') {
  document.getElementById('pwOverlay').style.display = 'none';
}

document.getElementById('pwForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const pw = document.getElementById('pw').value;
  if (!pw) { document.getElementById('pwErr').textContent='Please enter a password.'; document.getElementById('pwErr').classList.add('show'); return; }
  document.getElementById('pwBtn').disabled = true;
  document.getElementById('pwErr').classList.remove('show');
  if (await sha(pw) === PW_HASH) {
    sessionStorage.setItem('behappy_auth', 'true');
    document.getElementById('pwOverlay').style.display = 'none';
    loadData();
  } else {
    document.getElementById('pwErr').classList.remove('show');
    void document.getElementById('pwErr').offsetWidth;
    document.getElementById('pwErr').classList.add('show');
    document.getElementById('pwBtn').disabled = false;
  }
});

// ── Viewer code ─────────────────────────────────────────────
let DATA = null;
let talkMap = {};
let talkIndex = [];
let activeTalkId = null;
let player = null;
let videoHeight = 380;
let isDragging = false;
let isSidebarDragging = false;

async function loadData() {
  try {
    let data;
    const res = await fetch('data.json');
    if (res.ok) {
      data = await res.json();
    } else {
      data = await loadDataFromParts();
    }
    DATA = data;
    buildMaps(data);
    renderSidebar(data);
    if (document.getElementById('meta')) {
      document.getElementById('meta').textContent =
        `${data.meta.totalSections} sections \u00B7 ${data.meta.totalPlaylists} playlists \u00B7 ${data.meta.totalTalks} talks \u00B7 Generated ${data.meta.generated}`;
    }
    document.getElementById('loading').classList.add('hidden');
    if (location.hash) {
      const id = location.hash.replace('#', '');
      if (talkMap[id]) showTalk(id);
    }
  } catch (e) {
    document.querySelector('#loading p').textContent = 'Failed to load catalog. Make sure data files are present.';
    console.error(e);
  }
}

async function loadDataFromParts() {
  const cacheBust = '?v=' + Date.now();
  const metaRes = await fetch('data-part-1.json' + cacheBust);
  const metaData = await metaRes.json();
  const totalParts = metaData.meta.parts || 3;
  const allSections = [...metaData.sections];
  for (let i = 2; i <= totalParts; i++) {
    const r = await fetch('data-part-' + i + '.json' + cacheBust, { cache: 'no-cache' });
    const chunk = await r.json();
    allSections.push(...chunk.sections);
  }
  return { meta: metaData.meta, sections: allSections };
}

function buildMaps(data) {
  talkMap = {};
  talkIndex = [];
  for (const sec of data.sections) {
    for (const item of sec.items) {
      if (item.type === 'playlist') {
        for (const talk of item.talks) {
          talkMap[talk.id] = talk;
          talkIndex.push({ id: talk.id, title: talk.title, section: sec.name });
        }
      } else if (item.type === 'group') {
        for (const pl of item.playlists) {
          for (const talk of pl.talks) {
            talkMap[talk.id] = talk;
            talkIndex.push({ id: talk.id, title: talk.title, section: sec.name });
          }
        }
      }
    }
  }
}

function renderSidebar(data) {
  const sb = document.getElementById('sidebar');
  if (!sb) return;
  let html = '';
  for (const sec of data.sections) {
    const totalItems = sec.items.reduce((sum, it) => {
      if (it.type === 'playlist') return sum + it.talks.length;
      return sum + it.playlists.reduce((s, p) => s + p.talks.length, 0);
    }, 0);
    html += '<div class="nav-section"><button class="nav-section-toggle" onclick="toggleSection(\'' + sec.id + '\')"><span class="nav-caret">\u25B6</span> ' + sec.name + ' <span class="nav-count">' + totalItems + '</span></button><div class="nav-children" id="child-' + sec.id + '">';
    for (const item of sec.items) {
      if (item.type === 'group') {
        const totalInGroup = item.playlists.reduce((s, p) => s + p.talks.length, 0);
        html += '<div class="nav-section"><button class="nav-group-toggle" onclick="toggleGroup(\'' + item.id + '\')"><span class="nav-caret">\u25B6</span> ' + item.name + ' <span class="nav-count">' + totalInGroup + '</span></button><div class="nav-children" id="child-' + item.id + '">';
        for (const pl of item.playlists) {
          html += '<div class="nav-section"><button class="nav-pl-toggle" onclick="togglePlaylist(\'' + pl.id + '\')"><span class="nav-caret">\u25B6</span> ' + pl.name + ' <span class="nav-count">' + pl.talks.length + '</span></button><div class="nav-children" id="child-' + pl.id + '">';
          for (const talk of pl.talks) {
            html += '<a class="nav-talk" data-id="' + talk.id + '" onclick="return showTalk(\'' + talk.id + '\')">' + talk.title + '</a>';
          }
          html += '</div></div>';
        }
        html += '</div></div>';
      } else {
        html += '<div class="nav-section"><button class="nav-pl-toggle" onclick="togglePlaylist(\'' + item.id + '\')"><span class="nav-caret">\u25B6</span> ' + item.name + ' <span class="nav-count">' + item.talks.length + '</span></button><div class="nav-children" id="child-' + item.id + '">';
        for (const talk of item.talks) {
          html += '<a class="nav-talk" data-id="' + talk.id + '" onclick="return showTalk(\'' + talk.id + '\')">' + talk.title + '</a>';
        }
        html += '</div></div>';
      }
    }
    html += '</div></div>';
  }
  sb.innerHTML = html;
}

function toggleSection(id) { const el = document.getElementById('child-' + id); if (!el) return; el.classList.toggle('open'); const c = el.parentElement.querySelector('.nav-caret'); if (c) c.classList.toggle('open'); }
function toggleGroup(id) { const el = document.getElementById('child-' + id); if (!el) return; el.classList.toggle('open'); const c = el.parentElement.querySelector('.nav-caret'); if (c) c.classList.toggle('open'); }
function togglePlaylist(id) { const el = document.getElementById('child-' + id); if (!el) return; el.classList.toggle('open'); const c = el.parentElement.querySelector('.nav-caret'); if (c) c.classList.toggle('open'); }

function showTalk(id) {
  const talk = talkMap[id];
  if (!talk) return false;
  activeTalkId = id;
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.style.display = 'none';
  const tv = document.getElementById('talkView');
  if (tv) tv.classList.add('active');
  document.querySelectorAll('.nav-talk.active').forEach(el => el.classList.remove('active'));
  const navEl = document.querySelector('.nav-talk[data-id="' + id + '"]');
  if (navEl) {
    navEl.classList.add('active');
    let p = navEl.parentElement;
    while (p) { if (p.classList && p.classList.contains('nav-children')) { p.classList.add('open'); const c = p.parentElement.querySelector('.nav-caret'); if (c) c.classList.add('open'); } p = p.parentElement; }
  }
  const tp = document.getElementById('transcriptPane');
  if (!tp) return false;
  tp.innerHTML = talk.html;
  const watchBtn = document.createElement('button');
  watchBtn.className = 'watch-btn';
  watchBtn.textContent = '\u25B6 Watch on YouTube';
  watchBtn.onclick = function() { toggleVideo(talk.videoId); };
  const title = tp.querySelector('h1');
  if (title) { title.parentNode.insertBefore(watchBtn, title.nextSibling); } else { tp.prepend(watchBtn); }
  location.hash = id;
  return false;
}

function toggleVideo(videoId) {
  const vp = document.getElementById('videoPane');
  const dv = document.getElementById('divider');
  if (!videoId) { alert('No YouTube video URL available.'); return; }
  if (vp.classList.contains('active')) { closeVideo(); return; }
  vp.classList.add('active');
  dv.classList.add('active');
  vp.style.height = videoHeight + 'px';
  if (!player) {
    const tag = document.createElement('script');
    tag.src = 'https://www.youtube.com/iframe_api';
    const first = document.getElementsByTagName('script')[0];
    first.parentNode.insertBefore(tag, first);
    window._pendingVideoId = videoId;
  } else { player.loadVideoById(videoId); }
  document.querySelectorAll('.watch-btn').forEach(b => { b.textContent = '\u25A0 Close Video'; b.classList.add('watching'); });
}

function closeVideo() {
  const vp = document.getElementById('videoPane');
  const dv = document.getElementById('divider');
  vp.classList.remove('active'); dv.classList.remove('active');
  if (player) player.stopVideo();
  document.querySelectorAll('.watch-btn').forEach(b => { b.textContent = '\u25B6 Watch on YouTube'; b.classList.remove('watching'); });
}

function onYouTubeIframeAPIReady() {
  const id = window._pendingVideoId || '';
  if (!id) return;
  player = new YT.Player('player', { height: '100%', width: '100%', videoId: id, playerVars: { autoplay: 1, rel: 0 } });
}

const vc = document.getElementById('videoClose');
if (vc) vc.addEventListener('click', closeVideo);

// Resizable dividers
const div = document.getElementById('divider');
const vp = document.getElementById('videoPane');
if (div) {
  div.addEventListener('mousedown', function(e) { isDragging = true; document.body.style.cursor = 'ns-resize'; document.body.style.userSelect = 'none'; });
}
document.addEventListener('mousemove', function(e) {
  if (isDragging) {
    const tv = document.getElementById('talkView');
    const rect = tv.getBoundingClientRect();
    const y = e.clientY - rect.top;
    videoHeight = Math.max(100, Math.min(rect.height - 150, y - 20));
    vp.style.height = videoHeight + 'px';
  }
});
document.addEventListener('mouseup', function() {
  if (isDragging) { isDragging = false; document.body.style.cursor = ''; document.body.style.userSelect = ''; }
  if (isSidebarDragging) { isSidebarDragging = false; document.body.style.cursor = ''; document.body.style.userSelect = ''; }
});

const sbd = document.getElementById('sidebarDivider');
const sidebar = document.querySelector('.sidebar');
let sidebarWidth = 290;
if (sbd) {
  sbd.addEventListener('mousedown', function(e) { isSidebarDragging = true; document.body.style.cursor = 'ew-resize'; document.body.style.userSelect = 'none'; e.preventDefault(); });
  sbd.addEventListener('dblclick', function() { sidebarWidth = 290; sidebar.style.width = sidebarWidth + 'px'; try { localStorage.setItem('behappy_sidebar_width', sidebarWidth); } catch(e) {} });
}
document.addEventListener('mousemove', function(e) {
  if (!isSidebarDragging) return;
  sidebarWidth = Math.max(160, Math.min(550, e.clientX - 5));
  sidebar.style.width = sidebarWidth + 'px';
});
try { const saved = localStorage.getItem('behappy_sidebar_width'); if (saved) { sidebarWidth = parseInt(saved); sidebar.style.width = sidebarWidth + 'px'; } } catch(e) {}
document.addEventListener('mouseup', function() { if (isSidebarDragging) { try { localStorage.setItem('behappy_sidebar_width', sidebarWidth); } catch(e) {} } });

// Search
let searchTimeout = null;
const searchEl = document.getElementById('search');
if (searchEl) {
  searchEl.addEventListener('input', function() { clearTimeout(searchTimeout); searchTimeout = setTimeout(function() { filterSidebar(searchEl.value); }, 150); });
}
function filterSidebar(query) {
  const q = query.toLowerCase().trim();
  const allTalks = document.querySelectorAll('.nav-talk');
  const sections = document.querySelectorAll('.nav-section');
  const children = document.querySelectorAll('.nav-children');
  if (!q) {
    allTalks.forEach(t => t.style.display = ''); sections.forEach(s => s.style.display = ''); children.forEach(c => c.style.display = '');
    document.querySelectorAll('.search-empty').forEach(e => e.remove()); return;
  }
  let visibleCount = 0;
  for (const talk of allTalks) {
    const match = talk.textContent.toLowerCase().includes(q);
    talk.style.display = match ? '' : 'none';
    if (match) {
      visibleCount++;
      let p = talk.parentElement;
      while (p) {
        if (p.classList && p.classList.contains('nav-children')) { p.style.display = 'block'; p.classList.add('open'); const c = p.parentElement.querySelector('.nav-caret'); if (c) c.classList.add('open'); }
        if (p.classList && p.classList.contains('nav-section')) p.style.display = 'block';
        p = p.parentElement;
      }
    }
  }
  sections.forEach(s => { const talks = s.querySelectorAll('.nav-talk'); if (!Array.from(talks).some(t => t.style.display !== 'none') && !s.querySelector('.nav-section-toggle')) s.style.display = 'none'; });
  document.querySelectorAll('.search-empty').forEach(e => e.remove());
  if (visibleCount === 0) {
    const empty = document.createElement('div'); empty.className = 'search-empty'; empty.textContent = 'No talks match "' + query + '"';
    document.getElementById('sidebar').appendChild(empty);
  }
}

window.addEventListener('hashchange', function() { const id = location.hash.replace('#', ''); if (id && talkMap[id]) showTalk(id); });


// Mobile sidebar toggle
const menuToggle = document.getElementById('menuToggle');
const sidebarOverlay = document.getElementById('sidebarOverlay');
if (menuToggle && sidebarOverlay) {
  menuToggle.addEventListener('click', function() {
    document.querySelector('.sidebar').classList.toggle('open');
    sidebarOverlay.classList.toggle('open');
  });
  sidebarOverlay.addEventListener('click', function() {
    document.querySelector('.sidebar').classList.remove('open');
    sidebarOverlay.classList.remove('open');
  });
}


  document.querySelector('.content').addEventListener('click', function() {
    if (window.innerWidth <= 768 && document.querySelector('.sidebar.open')) {
      document.querySelector('.sidebar').classList.remove('open');
      document.getElementById('sidebarOverlay').classList.remove('open');
    }
  });

// Init
if (sessionStorage.getItem('behappy_auth') === 'true') {
  loadData();
}
